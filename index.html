<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050505;
color:white;
overflow-x:hidden;
}

/* ARKA PLAN PARTİKÜL */
.particle{
position:fixed;
width:6px;
height:6px;
background:red;
border-radius:50%;
opacity:0.7;
animation: float 10s infinite linear;
}

@keyframes float{
0%{transform:translateY(100vh);opacity:0;}
50%{opacity:1;}
100%{transform:translateY(-10vh);opacity:0;}
}

/* ORTA KUTU */
.container{
width:90%;
max-width:420px;
margin:80px auto;
background:#0d0d0d;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px red;
text-align:center;
}

h1{color:red;}

/* INPUT */
input{
width:90%;
padding:12px;
border-radius:10px;
border:none;
background:#222;
color:white;
margin-bottom:10px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
margin-top:10px;
border:none;
border-radius:10px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

/* FPS BUTONLAR */
.fps button{
width:30%;
margin:5px;
background:#111;
border:1px solid red;
}

/* RESULT */
.result{
display:none;
width:90%;
max-width:500px;
margin:20px auto;
background:#0d0d0d;
padding:20px;
border-radius:15px;
box-shadow:0 0 20px red;
}

.bar{
height:10px;
background:#222;
border-radius:10px;
margin:5px 0 15px;
position:relative;
}

.fill{
height:10px;
background:red;
border-radius:10px;
}

/* COPY */
.copy{
background:#222;
margin-top:10px;
}
</style>
</head>

<body>

<div id="particles"></div>

<!-- ANA SAYFA -->
<div class="container" id="home">
<h1>wedzxsensi</h1>

<input id="device" placeholder="Cihaz modeli (iPhone 13 vs)">

<div class="fps">
<button onclick="setFPS(60)">60 FPS</button>
<button onclick="setFPS(90)">90 FPS</button>
<button onclick="setFPS(120)">120 FPS</button>
</div>

<button onclick="generate()">AI Hassasiyet Oluştur</button>
</div>

<!-- SONUÇ -->
<div class="result" id="result">
<h2>YAPAY ZEKA SONUCU</h2>
<p id="info"></p>

<div id="bars"></div>

<button class="copy" onclick="copyText()">KOPYALA</button>
</div>

<script>
let fps = 60;

function setFPS(val){
fps = val;
}

function generate(){
document.getElementById("home").style.display="none";
document.getElementById("result").style.display="block";

let device = document.getElementById("device").value || "Bilinmeyen Cihaz";

document.getElementById("info").innerText = device + " • " + fps + " FPS";

let data = {
Genel: random(),
"Kırmızı Nokta": random(),
"2x Dürbün": random(),
"4x Dürbün": random(),
"Tüfek Dürbünü": random(),
"Serbest Bakış": 200
};

let bars = document.getElementById("bars");
bars.innerHTML="";

for(let key in data){
bars.innerHTML += `
<div>${key} : ${data[key]}</div>
<div class="bar"><div class="fill" style="width:${data[key]/2}%"></div></div>
`;
}
}

function random(){
return Math.floor(Math.random()*80)+120;
}

function copyText(){
let text = document.getElementById("info").innerText;
navigator.clipboard.writeText(text);
alert("Kopyalandı!");
}

/* PARTİKÜL */
for(let i=0;i<40;i++){
let p=document.createElement("div");
p.className="particle";
p.style.left=Math.random()*100+"vw";
p.style.animationDuration=(5+Math.random()*10)+"s";
document.getElementById("particles").appendChild(p);
}
</script>

</body>
</html>
