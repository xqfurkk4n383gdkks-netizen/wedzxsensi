<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>wedzXsensi AI</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}
body{background:#000;color:#fff;overflow:hidden;display:flex;justify-content:center;align-items:center;height:100vh}

canvas{position:fixed;top:0;left:0;width:100%;height:100%;z-index:-1}

.container{width:90%;max-width:380px;background:rgba(0,0,0,.85);border:1px solid red;border-radius:20px;padding:20px}

.logo{text-align:center;font-size:28px;font-weight:900;text-shadow:0 0 10px red}

.btn{width:100%;padding:12px;margin:8px 0;background:#111;color:#fff;border:1px solid red;border-radius:10px}

.hidden{display:none}

.resultItem{display:flex;justify-content:space-between;padding:10px;background:#111;margin:5px 0;border-radius:10px}
.value{color:red;font-weight:bold}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">wedzXsensi</div>

<div id="step1">
<button class="btn" onclick="selectDevice('Android')">Android</button>
<button class="btn" onclick="selectDevice('iPhone')">iPhone</button>
</div>

<div id="step2" class="hidden">
<button class="btn" onclick="selectStyle('Rush')">Rush</button>
<button class="btn" onclick="selectStyle('Range')">Range</button>
</div>

<div id="step3" class="hidden">
<button class="btn" onclick="selectFinger(2)">2 Parmak</button>
<button class="btn" onclick="selectFinger(3)">3 Parmak</button>
<button class="btn" onclick="selectFinger(4)">4 Parmak</button>
</div>

<div id="step4" class="hidden">
<button class="btn" onclick="generate()">Hesapla</button>
</div>

<div id="result" class="hidden">

<div class="resultItem"><span>Genel</span><span id="general"></span></div>
<div class="resultItem"><span>Kırmızı</span><span id="red"></span></div>
<div class="resultItem"><span>2x</span><span id="x2"></span></div>
<div class="resultItem"><span>4x</span><span id="x4"></span></div>
<div class="resultItem"><span>Sniper</span><span id="sniper"></span></div>
<div class="resultItem"><span>Free</span><span id="free"></span></div>
<div class="resultItem"><span>DPI</span><span id="dpi"></span></div>
<div class="resultItem"><span>Fire</span><span id="fire"></span></div>

</div>

</div>

<script>

let device="",style="",finger=2;

function selectDevice(v){device=v;document.getElementById("step1").classList.add("hidden");document.getElementById("step2").classList.remove("hidden")}
function selectStyle(v){style=v;document.getElementById("step2").classList.add("hidden");document.getElementById("step3").classList.remove("hidden")}
function selectFinger(v){finger=v;document.getElementById("step3").classList.add("hidden");document.getElementById("step4").classList.remove("hidden")}

function rand(a,b){return Math.floor(Math.random()*(b-a+1))+a}

function generate(){

document.getElementById("step4").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

if(device==="iPhone"){

document.getElementById("general").innerText=100+rand(0,10);
document.getElementById("red").innerText=95+rand(0,10);
document.getElementById("x2").innerText=85+rand(0,10);
document.getElementById("x4").innerText=75+rand(0,10);
document.getElementById("sniper").innerText=60+rand(0,10);
document.getElementById("free").innerText=100+rand(0,10);
document.getElementById("dpi").innerText=500+rand(0,50);
document.getElementById("fire").innerText=45+rand(0,5)+"%";

return;
}

let base=155;
if(style==="Rush")base+=10;
if(style==="Range")base-=5;
if(finger===4)base+=5;

document.getElementById("general").innerText=Math.min(200,base+rand(0,10));
document.getElementById("red").innerText=Math.min(200,base+rand(-5,10));
document.getElementById("x2").innerText=Math.min(200,base-10+rand(0,10));
document.getElementById("x4").innerText=Math.min(200,base-20+rand(0,10));
document.getElementById("sniper").innerText=Math.min(200,base-30+rand(0,10));
document.getElementById("free").innerText=Math.min(200,base+rand(-10,10));
document.getElementById("dpi").innerText=rand(500,800);
document.getElementById("fire").innerText=rand(45,65)+"%";

}

/* KIRMIZI NOKTALAR */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");
canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];
for(let i=0;i<80;i++){
dots.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,vx:(Math.random()-.5)*2,vy:(Math.random()-.5)*2,r:2});
}

function animate(){
ctx.fillStyle="black";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let d of dots){
d.x+=d.vx;d.y+=d.vy;
if(d.x<0||d.x>canvas.width)d.vx*=-1;
if(d.y<0||d.y>canvas.height)d.vy*=-1;

ctx.fillStyle="red";
ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
