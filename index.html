<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 70% 30%, rgba(255,0,0,0.25), transparent 55%),
radial-gradient(circle at 30% 80%, rgba(120,0,0,0.25), transparent 60%),
#000;
}

/* LAYOUT */
.wrapper{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:200px;
background:rgba(10,10,10,0.9);
border-right:1px solid rgba(255,0,0,0.2);
padding:20px;
}

.logo{
font-size:18px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{color:red;}

.sidebar button{
width:100%;
padding:12px;
margin:10px 0;
background:#111;
border:1px solid rgba(255,0,0,0.2);
color:white;
border-radius:10px;
cursor:pointer;
}

/* MAIN */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:flex-start;
padding-top:70px;
}

/* CARD */
.card{
width:420px;
background:rgba(15,15,15,0.85);
border:1px solid rgba(255,0,0,0.25);
border-radius:14px;
padding:20px;
box-shadow:0 0 25px rgba(255,0,0,0.15);
backdrop-filter: blur(10px);
}

/* INPUT */
input{
width:100%;
padding:12px;
border:none;
border-radius:10px;
background:#000;
color:white;
border:1px solid rgba(255,0,0,0.2);
}

/* FPS */
.fps{
display:flex;
gap:10px;
margin-top:10px;
}

.fps button{
flex:1;
padding:10px;
background:#111;
border:1px solid rgba(255,0,0,0.2);
color:white;
border-radius:10px;
cursor:pointer;
}

.fps button.active{
background:red;
box-shadow:0 0 12px red;
}

/* BUTTON */
.generate{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:12px;
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

/* RESULT PAGE */
.bar{
margin:14px 0;
}

.top{
display:flex;
justify-content:space-between;
font-size:13px;
}

.track{
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:6px;
}

.fill{
height:100%;
width:0%;
background:red;
box-shadow:0 0 10px red;
transition:1s;
}

/* HIDE */
.hidden{display:none;}
</style>
</head>

<body>

<div class="bg"></div>

<div class="wrapper">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">wedzx<span>sensi</span></div>

<button onclick="showHome()">Home</button>
<button onclick="showResult()">Sensitivity</button>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div class="card" id="home">
<h3>Device Model</h3>
<input id="device" placeholder="iPhone / Redmi / Samsung">

<h3>FPS</h3>
<div class="fps">
<button onclick="setFPS(60,this)">60 FPS</button>
<button onclick="setFPS(90,this)">90 FPS</button>
<button onclick="setFPS(120,this)">120 FPS</button>
</div>

<button class="generate" onclick="generate()">AI HASSASİYET OLUŞTUR</button>
</div>

<!-- RESULT -->
<div class="card hidden" id="result">
<h3>YAPAY ZEKA SONUCU</h3>
<div id="bars"></div>
</div>

</div>

</div>

<script>

let fps=60;

function setFPS(v,btn){
fps=v;
document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

/* HOME -> RESULT */
function generate(){

document.getElementById("home").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");

let base = fps==60?150:fps==90?175:195;

let data={
"Genel":base,
"Kırmızı Nokta":base-10,
"2x Dürbün":base-25,
"4x Dürbün":base-45,
"Tüfek":base-60,
"Serbest Bakış":200
};

let html="";

for(let k in data){
html+=`
<div class="bar">
<div class="top"><span>${k}</span><span>${data[k]}</span></div>
<div class="track"><div class="fill" style="width:${data[k]/2}%"></div></div>
</div>
`;
}

document.getElementById("bars").innerHTML=html;
}

/* SIDEBAR NAV */
function showHome(){
document.getElementById("home").classList.remove("hidden");
document.getElementById("result").classList.add("hidden");
}

function showResult(){
if(document.getElementById("bars").innerHTML==""){
generate();
}else{
document.getElementById("home").classList.add("hidden");
document.getElementById("result").classList.remove("hidden");
}
}

</script>

</body>
</html>
