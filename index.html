<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi</title>

<style>
body{
background:#070707;
color:white;
font-family:Arial;
text-align:center;
padding:20px;
}

.logo{
font-size:40px;
font-weight:bold;
color:#ff0000;
margin-top:15px;
}

.alt{
color:#aaa;
margin-bottom:20px;
}

.kutu{
background:#111;
padding:20px;
border-radius:18px;
max-width:420px;
margin:auto;
box-shadow:0 0 20px red;
}

input{
width:90%;
padding:14px;
border-radius:12px;
border:none;
background:#222;
color:white;
margin-bottom:15px;
font-size:16px;
}

button{
width:95%;
padding:15px;
border:none;
border-radius:12px;
background:red;
color:white;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

.fps button{
width:30%;
margin:5px;
padding:10px;
font-size:14px;
background:#222;
}

.fps .active{
background:red;
}

#sonuc{
margin-top:20px;
text-align:left;
background:#1a1a1a;
padding:15px;
border-radius:12px;
display:none;
}
</style>
</head>

<body>

<div class="logo">wedzXsensi</div>
<div class="alt">FREE FIRE • AI HASSASİYET MOTORU</div>

<div class="kutu">

<input type="text" id="cihaz" placeholder="Cihaz Modeli">

<div class="fps">
<button onclick="fpsSec(60,this)" class="active">60 FPS</button>
<button onclick="fpsSec(90,this)">90 FPS</button>
<button onclick="fpsSec(120,this)">120 FPS</button>
</div>

<button onclick="hesapla()">AI HASSASİYET OLUŞTUR</button>

<div id="sonuc"></div>

</div>

<script>

let fps = 60;

function fpsSec(x,btn){
fps = x;
document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function hesapla(){

let cihaz = document.getElementById("cihaz").value.toLowerCase();

let base = 180;

// cihaz boost sistemi
if(cihaz.includes("iphone")) base = 200;
else if(cihaz.includes("redmi")) base = 195;
else if(cihaz.includes("xiaomi")) base = 193;
else if(cihaz.includes("samsung")) base = 190;
else if(cihaz.length < 3) base = 170;

// FPS etkisi
let fpsBoost = fps === 60 ? 20 : fps === 90 ? 10 : 0;

let genel = Math.min(200, base + fpsBoost);
let redDot = Math.min(200, genel - 2);
let x2 = Math.min(200, genel - 6);
let x4 = Math.min(200, genel - 10);
let awm = Math.min(200, genel - 15);
let bakis = 200;

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=`
<h2>🔥 Premium Hassasiyet</h2>
<p>📱 Cihaz: ${cihaz || "Bilinmiyor"}</p>
<p>⚡ FPS: ${fps}</p>
<hr>
<p>🎯 Genel: ${genel}</p>
<p>🔴 Kırmızı Nokta: ${redDot}</p>
<p>🔭 2x: ${x2}</p>
<p>🎯 4x: ${x4}</p>
<p>💥 AWM: ${awm}</p>
<p>👁 Serbest: ${bakis}</p>
`;
}

</script>

</body>
</html>
