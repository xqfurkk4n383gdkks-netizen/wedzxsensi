<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi W2 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

canvas{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
width:92%;
max-width:430px;
padding:20px;
border-radius:18px;
background:rgba(10,10,10,.8);
border:1px solid rgba(255,0,80,.4);
box-shadow:0 0 25px rgba(255,0,80,.4);
}

.logo{
text-align:center;
font-size:28px;
font-weight:900;
margin-bottom:10px;
color:#ff3b6b;
text-shadow:0 0 15px #ff0044;
}

.btn{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,0,60,.2);
}

.btn:hover{
box-shadow:0 0 15px #ff0044;
transform:scale(1.02);
}

.hidden{display:none;}

.item{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:#111;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
}

.val{color:#ff4d6d;font-weight:bold;}

select{
width:100%;
padding:10px;
margin:5px 0;
border-radius:10px;
background:#111;
color:#fff;
border:1px solid rgba(255,255,255,.2);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">wedzXsensi W2 PRO</div>

<div id="step1">
<button class="btn" onclick="setDevice('iPhone')">iPhone</button>
<button class="btn" onclick="setDevice('Android')">Android</button>
<button class="btn" onclick="setDevice('PC')">PC</button>
</div>

<div id="step2" class="hidden">
<select id="model">
<option value="iphone11">iPhone 11</option>
<option value="iphone12">iPhone 12</option>
<option value="iphone13">iPhone 13</option>
<option value="iphone14">iPhone 14</option>
<option value="iphone15">iPhone 15</option>
<option value="iphone16">iPhone 16</option>
<option value="iphone17">iPhone 17</option>
<option value="pro">Pro</option>
<option value="promax">Pro Max</option>
</select>

<button class="btn" onclick="nextStep()">Devam</button>
</div>

<div id="step3" class="hidden">
<button class="btn" onclick="setFinger(2)">2 Parmak</button>
<button class="btn" onclick="setFinger(3)">3 Parmak</button>
<button class="btn" onclick="setFinger(4)">4 Parmak</button>
</div>

<div id="step4" class="hidden">
<button class="btn" onclick="generate()">HASSASİYET ÜRET</button>
</div>

<div id="result" class="hidden">

<div class="item"><span>Genel</span><span id="gen" class="val"></span></div>
<div class="item"><span>Kırmızı</span><span id="red" class="val"></span></div>
<div class="item"><span>2x</span><span id="x2" class="val"></span></div>
<div class="item"><span>4x</span><span id="x4" class="val"></span></div>
<div class="item"><span>Sniper</span><span id="sniper" class="val"></span></div>
<div class="item"><span>DPI</span><span id="dpi" class="val"></span></div>
<div class="item"><span>Headshot %</span><span id="hs" class="val"></span></div>

<button class="btn" onclick="generate()">Yeniden Oluştur</button>
<button class="btn" onclick="copy()">Kopyala</button>

</div>

</div>

<script>

let device="",finger=2;

function setDevice(v){
device=v;
document.getElementById("step1").classList.add("hidden");
document.getElementById("step2").classList.remove("hidden");
}

function nextStep(){
document.getElementById("step2").classList.add("hidden");
document.getElementById("step3").classList.remove("hidden");
}

function setFinger(v){
finger=v;
document.getElementById("step3").classList.add("hidden");
document.getElementById("step4").classList.remove("hidden");
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){

document.getElementById("result").classList.remove("hidden");

let model=document.getElementById("model").value;

let boost=finger*2;

if(device==="iPhone"){
gen.innerText=rand(80,100);
red.innerText=rand(80,100);
x2.innerText=rand(75,95);
x4.innerText=rand(70,90);
sniper.innerText=rand(65,85);
dpi.innerText=rand(70,120);
hs.innerText=rand(80,99);
}

else if(device==="Android"){
gen.innerText=rand(170,200);
red.innerText=rand(165,200);
x2.innerText=rand(160,195);
x4.innerText=rand(150,190);
sniper.innerText=rand(140,185);
dpi.innerText=rand(500,800);
hs.innerText=rand(75,98);
}

else if(device==="PC"){
gen.innerText=rand(30,70);
red.innerText=rand(35,75);
x2.innerText=rand(25,65);
x4.innerText=rand(20,60);
sniper.innerText=rand(40,80);
dpi.innerText=rand(400,1200);
hs.innerText=rand(60,95);
}

}

function copy(){

let text=
"wedzXsensi W2 PRO\n"+
"Genel: "+gen.innerText+"\n"+
"Kırmızı: "+red.innerText+"\n"+
"2x: "+x2.innerText+"\n"+
"4x: "+x4.innerText+"\n"+
"Sniper: "+sniper.innerText+"\n"+
"DPI: "+dpi.innerText+"\n"+
"Headshot: "+hs.innerText+"%";

navigator.clipboard.writeText(text);
alert("Kopyalandı!");
}

/* NEON BACKGROUND */
const c=document.getElementById("bg");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let dots=[];
for(let i=0;i<250;i++){
dots.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:(Math.random()-.5)*1.5,
vy:(Math.random()-.5)*1.5,
r:Math.random()*2
});
}

function anim(){
x.fillStyle="#000";
x.fillRect(0,0,c.width,c.height);

for(let d of dots){
d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>c.width)d.vx*=-1;
if(d.y<0||d.y>c.height)d.vy*=-1;

x.beginPath();
x.arc(d.x,d.y,d.r,0,Math.PI*2);
x.fillStyle="#ff0055";
x.fill();
}

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
