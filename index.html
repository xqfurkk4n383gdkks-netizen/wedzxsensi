<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body {
    margin:0;
    font-family: Arial;
    background:black;
    color:white;
    overflow-x:hidden;
}

/* neon background */
.particles {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    z-index:-1;
}

.particles span {
    position:absolute;
    width:6px;
    height:6px;
    background:red;
    border-radius:50%;
    box-shadow:0 0 10px red;
    animation: move 6s linear infinite;
}

@keyframes move {
    0% {transform:translateY(0);}
    100% {transform:translateY(-100vh);}
}

/* layout */
.sidebar {
    width:200px;
    height:100vh;
    position:fixed;
    left:0;
    top:0;
    background:rgba(20,0,0,0.8);
    padding:20px;
}

.btn {
    display:block;
    padding:12px;
    margin-top:10px;
    background:#111;
    border:1px solid red;
    color:white;
    cursor:pointer;
    border-radius:10px;
}

.btn:hover {background:red;}

.main {
    margin-left:220px;
    padding:30px;
}

.card {
    background:#111;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 20px red;
    max-width:400px;
}

input, select {
    width:100%;
    padding:10px;
    margin-top:10px;
    background:black;
    border:1px solid red;
    color:white;
    border-radius:8px;
}

.generate {
    margin-top:15px;
    width:100%;
    padding:12px;
    background:red;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:10px;
    cursor:pointer;
}

.result {
    margin-top:20px;
    padding:15px;
    background:#0a0a0a;
    border:1px solid red;
    border-radius:10px;
}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="sidebar">
    <h2 style="color:red">wedzxsensi</h2>
    <button class="btn" onclick="show('home')">Home</button>
    <button class="btn" onclick="show('sens')">Sensitivity</button>
</div>

<div class="main">

<!-- HOME -->
<div id="home">
    <h1>Free Fire AI Sensitivity</h1>
    <p>En iyi hassasiyet ayarlarını oluştur</p>
</div>

<!-- SENS -->
<div id="sens" style="display:none;">
    <div class="card">
        <h2>Device</h2>
        <input id="device" placeholder="iPhone / Redmi / Samsung">

        <h2>FPS</h2>
        <select id="fps">
            <option>60</option>
            <option>90</option>
            <option>120</option>
        </select>

        <button class="generate" onclick="generate()">GENERATE</button>

        <div class="result" id="result"></div>
    </div>
</div>

</div>

<script>
// particles
const p = document.getElementById("particles");
for(let i=0;i<40;i++){
    let s=document.createElement("span");
    s.style.left=Math.random()*100+"%";
    s.style.top=Math.random()*100+"%";
    s.style.animationDuration=(2+Math.random()*5)+"s";
    p.appendChild(s);
}

// page switch
function show(page){
    document.getElementById("home").style.display = page==="home"?"block":"none";
    document.getElementById("sens").style.display = page==="sens"?"block":"none";
}

// AI fake sensitivity generator
function generate(){
    let fps = document.getElementById("fps").value;

    let base = fps==120 ? 180 : fps==90 ? 160 : 140;

    let data = {
        Genel: base,
        KirmiziNokta: base-5,
        Durbun2x: base-15,
        Durbun4x: base-25,
        Tufek: base-35,
        Serbest: 200
    };

    document.getElementById("result").innerHTML = `
        <h3>AI RESULT</h3>
        Genel: ${data.Genel}<br>
        Kırmızı Nokta: ${data.KirmiziNokta}<br>
        2x Dürbün: ${data.Durbun2x}<br>
        4x Dürbün: ${data.Durbun4x}<br>
        Tüfek: ${data.Tufek}<br>
        Serbest Bakış: ${data.Serbest}
    `;
}
</script>

</body>
</html>
