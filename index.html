<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 30%, rgba(255,0,0,0.25), transparent 50%),
radial-gradient(circle at 80% 70%, rgba(120,0,0,0.25), transparent 55%),
#000;
}

/* LAYOUT */
.container{
display:flex;
height:100vh;
}

/* SIDEBAR */
.sidebar{
width:220px;
background:rgba(10,10,10,0.95);
border-right:1px solid rgba(255,0,0,0.2);
padding:20px;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:40px;
}

.logo span{color:red;}

.nav button{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
border:1px solid rgba(255,0,0,0.2);
}

.nav button:hover{
background:red;
}

/* MAIN */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:420px;
background:rgba(15,15,15,0.85);
border:1px solid rgba(255,0,0,0.25);
border-radius:16px;
padding:20px;
backdrop-filter: blur(10px);
box-shadow:0 0 30px rgba(255,0,0,0.15);
}

/* INPUT */
input{
width:100%;
padding:12px;
background:#000;
border:1px solid rgba(255,0,0,0.25);
border-radius:10px;
color:white;
margin-top:10px;
}

/* FPS */
.fps{
display:flex;
gap:10px;
margin-top:10px;
}

.fps button{
flex:1;
padding:10px;
border:none;
border-radius:10px;
background:#111;
color:white;
cursor:pointer;
border:1px solid rgba(255,0,0,0.2);
}

.fps button.active{
background:red;
box-shadow:0 0 10px red;
}

/* BUTTON */
.gen{
width:100%;
margin-top:15px;
padding:12px;
border:none;
border-radius:12px;
background:linear-gradient(90deg,#ff0000,#8b0000);
color:white;
font-weight:bold;
cursor:pointer;
}

.gen:hover{
opacity:0.9;
}
</style>

</head>

<body>

<div class="bg"></div>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
<div class="logo">wedzx<span>sensi</span></div>

<div class="nav">
<button>Home</button>
<button>Sensitivity</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card">
<h3>Device</h3>
<input placeholder="iPhone / Redmi / Samsung">

<h3>FPS</h3>
<div class="fps">
<button onclick="setFPS(60,this)">60</button>
<button onclick="setFPS(90,this)">90</button>
<button onclick="setFPS(120,this)">120</button>
</div>

<button class="gen">GENERATE</button>
</div>

</div>

</div>

<script>
let fps=60;

function setFPS(v,btn){
fps=v;
document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}
</script>

</body>
</html>
