<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
margin:0;
background:#050505;
font-family:Arial;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:
radial-gradient(circle at 20% 20%, rgba(255,0,0,0.25), transparent 45%),
radial-gradient(circle at 80% 80%, rgba(255,0,0,0.15), transparent 45%);
z-index:-1;
animation:move 6s infinite alternate;
}

@keyframes move{
from{transform:scale(1);}
to{transform:scale(1.1);}
}

/* APP */
.app{
display:flex;
height:100vh;
}

/* SIDEBAR */
.side{
width:220px;
background:#0b0b0b;
border-right:1px solid rgba(255,0,0,0.2);
padding:20px;
}

.logo{
font-size:20px;
font-weight:bold;
margin-bottom:30px;
}

.logo span{color:red;}

.menu button{
width:100%;
margin:8px 0;
padding:10px;
background:#111;
border:1px solid rgba(255,0,0,0.2);
color:white;
border-radius:8px;
cursor:pointer;
}

.menu button:hover{
background:red;
}

/* MAIN */
.main{
flex:1;
display:flex;
justify-content:center;
align-items:center;
}

/* CARD */
.card{
width:420px;
background:#111;
padding:20px;
border-radius:15px;
border:1px solid rgba(255,0,0,0.2);
box-shadow:0 0 25px rgba(255,0,0,0.2);
}

/* INPUT */
input{
width:100%;
padding:12px;
background:#000;
border:none;
border-radius:10px;
color:white;
margin-top:10px;
}

/* FPS */
.fps{
display:flex;
gap:8px;
margin-top:10px;
}

.fps button{
flex:1;
padding:10px;
background:#222;
border:none;
color:white;
border-radius:8px;
cursor:pointer;
}

.fps button.active{
background:red;
}

/* BUTTON */
.btn{
width:100%;
margin-top:15px;
padding:12px;
background:red;
border:none;
color:white;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

/* RESULT */
.bar{
margin:12px 0;
}

.label{
display:flex;
justify-content:space-between;
font-size:13px;
}

.line{
height:6px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.fill{
height:100%;
background:red;
width:0%;
transition:1s;
box-shadow:0 0 10px red;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="app">

<!-- SIDEBAR -->
<div class="side">
<div class="logo">wedzx<span>sensi</span></div>

<div class="menu">
<button onclick="showHome()">Ana Sayfa</button>
<button onclick="generate()">Hassasiyet</button>
</div>
</div>

<!-- MAIN -->
<div class="main">

<div class="card" id="home">
<h3>Cihaz</h3>
<input id="device" placeholder="iPhone / Redmi">

<h3>FPS</h3>
<div class="fps">
<button onclick="setFPS(60,this)">60</button>
<button onclick="setFPS(90,this)">90</button>
<button onclick="setFPS(120,this)">120</button>
</div>

<button class="btn" onclick="generate()">Oluştur</button>
</div>

<div class="card" id="result" style="display:none">

<h3>AI Hassasiyet</h3>
<div id="bars"></div>

</div>

</div>
</div>

<script>

let fps=60;

function setFPS(v,btn){
fps=v;
document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
btn.classList.add("active");
}

function generate(){

document.getElementById("home").style.display="none";
document.getElementById("result").style.display="block";

let base = fps==60?150:fps==90?170:190;

let data={
"Genel":base,
"Kırmızı Nokta":base-10,
"2x":base-25,
"4x":base-45,
"Tüfek":base-60,
"Serbest":200
};

let html="";

for(let k in data){
html+=`
<div class="bar">
<div class="label"><span>${k}</span><span>${data[k]}</span></div>
<div class="line"><div class="fill" style="width:${data[k]/2}%"></div></div>
</div>
`;
}

document.getElementById("bars").innerHTML=html;
}

function showHome(){
document.getElementById("home").style.display="block";
document.getElementById("result").style.display="none";
}

</script>

</body>
</html>
