<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi</title>

<style>
body{
background:#080808;
font-family:Arial,sans-serif;
color:white;
text-align:center;
padding:20px;
}

.logo{
font-size:38px;
font-weight:bold;
color:#ff1a1a;
margin-top:20px;
}

.alt{
color:#bbb;
margin-bottom:25px;
}

.kutu{
background:#111;
border:2px solid #ff1a1a;
border-radius:20px;
padding:20px;
max-width:420px;
margin:auto;
box-shadow:0 0 20px red;
}

input{
width:90%;
padding:15px;
border:none;
border-radius:12px;
background:#222;
color:white;
font-size:16px;
margin-bottom:15px;
}

button{
width:95%;
padding:15px;
background:#ff1a1a;
color:white;
border:none;
border-radius:12px;
font-size:18px;
font-weight:bold;
cursor:pointer;
}

#sonuc{
margin-top:20px;
text-align:left;
background:#1a1a1a;
padding:15px;
border-radius:12px;
display:none;
}
</style>
</head>

<body>

<div class="logo">wedzXsensi</div>
<div class="alt">Premium Free Fire Hassasiyet Motoru</div>

<div class="kutu">

<input type="text" id="cihaz" placeholder="Cihaz Modeli">

<button onclick="hesapla()">
AI HASSASİYET OLUŞTUR
</button>

<div id="sonuc"></div>

</div>

<script>

function hesapla(){

let cihaz =
document.getElementById("cihaz").value.toLowerCase();

let genel=200;
let nokta=200;
let iki=200;
let dort=200;
let awm=200;
let bakis=200;

if(cihaz.includes("iphone")){
genel=200;
nokta=200;
iki=195;
dort=190;
awm=185;
bakis=200;
}

else if(
cihaz.includes("redmi") ||
cihaz.includes("xiaomi")
){
genel=198;
nokta=200;
iki=194;
dort=188;
awm=180;
bakis=200;
}

else if(
cihaz.includes("samsung")
){
genel=197;
nokta=200;
iki=193;
dort=187;
awm=178;
bakis=200;
}

document.getElementById("sonuc").style.display="block";

document.getElementById("sonuc").innerHTML=
`
<h2>Premium Hassasiyet</h2>

<p>🎯 Genel: ${genel}</p>
<p>🔴 Kırmızı Nokta: ${nokta}</p>
<p>🔭 2x Dürbün: ${iki}</p>
<p>🎯 4x Dürbün: ${dort}</p>
<p>💥 AWM: ${awm}</p>
<p>👁 Serbest Bakış: ${bakis}</p>

`;
}

</script>

</body>
</html>
