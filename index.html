<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial, Helvetica, sans-serif;
}

body{
  background:#050505;
  color:white;
  display:flex;
  height:100vh;
  overflow:hidden;
}

/* LEFT MENU */
.sidebar{
  width:220px;
  background:linear-gradient(180deg,#120000,#000);
  padding:20px;
  border-right:2px solid #ff000055;
}

.logo{
  color:red;
  font-size:22px;
  font-weight:bold;
  margin-bottom:30px;
}

.btn{
  display:block;
  padding:12px;
  margin:10px 0;
  background:#111;
  border:1px solid #ff000055;
  color:white;
  border-radius:10px;
  cursor:pointer;
  transition:0.3s;
}

.btn:hover{
  background:red;
}

/* MAIN */
.main{
  flex:1;
  display:flex;
  justify-content:center;
  align-items:center;
  background:radial-gradient(circle at top,#220000,#000);
  position:relative;
}

/* floating dots */
.main::before{
  content:"";
  position:absolute;
  width:100%;
  height:100%;
  background-image:radial-gradient(red 1px, transparent 1px);
  background-size:50px 50px;
  opacity:0.2;
  animation:move 6s infinite linear;
}

@keyframes move{
  from{transform:translateY(0);}
  to{transform:translateY(50px);}
}

/* CARD */
.card{
  width:380px;
  background:#0d0d0d;
  border:1px solid #ff000040;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 20px red;
  z-index:2;
}

h2{
  text-align:center;
  margin-bottom:20px;
}

input,select{
  width:100%;
  padding:12px;
  margin:10px 0;
  background:#000;
  border:1px solid #ff000055;
  color:white;
  border-radius:10px;
}

.fps{
  display:flex;
  justify-content:space-between;
  margin:10px 0;
}

.fps button{
  flex:1;
  margin:5px;
  padding:10px;
  background:#111;
  border:1px solid #ff000055;
  color:white;
  border-radius:10px;
  cursor:pointer;
}

.fps button.active{
  background:red;
}

.generate{
  width:100%;
  padding:14px;
  background:red;
  border:none;
  border-radius:12px;
  color:white;
  font-weight:bold;
  cursor:pointer;
  margin-top:10px;
}

/* RESULT */
.result{
  margin-top:15px;
  padding:15px;
  background:#111;
  border-radius:12px;
  border:1px solid #ff000055;
}

.bar{
  margin:8px 0;
}

.fill{
  height:6px;
  background:red;
  border-radius:10px;
}

.small{
  font-size:12px;
  opacity:0.8;
}
</style>
</head>

<body>

<div class="sidebar">
  <div class="logo">wedzxsensi</div>
  <div class="btn">Home</div>
  <div class="btn">Sensitivity</div>
</div>

<div class="main">

  <div class="card">
    <h2>AI Sensitivity</h2>

    <input placeholder="Device (iPhone / Samsung / Redmi)">

    <div class="fps">
      <button onclick="setFPS(this)">60</button>
      <button onclick="setFPS(this)">90</button>
      <button onclick="setFPS(this)">120</button>
    </div>

    <button class="generate" onclick="generate()">GENERATE</button>

    <div class="result" id="result" style="display:none;">
      <h3>AI RESULT</h3>

      <div class="bar">Genel <div class="fill" style="width:85%"></div></div>
      <div class="bar">Kırmızı Nokta <div class="fill" style="width:80%"></div></div>
      <div class="bar">2x Dürbün <div class="fill" style="width:75%"></div></div>
      <div class="bar">4x Dürbün <div class="fill" style="width:70%"></div></div>
      <div class="bar">Serbest Bakış <div class="fill" style="width:95%"></div></div>

      <p class="small">AI optimized sensitivity generated.</p>
    </div>

  </div>

</div>

<script>
let fps = 60;

function setFPS(btn){
  document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  fps = btn.innerText;
}

function generate(){
  document.getElementById("result").style.display="block";

  let base = fps == 120 ? 95 : fps == 90 ? 85 : 75;

  document.querySelectorAll(".fill").forEach((bar,i)=>{
    bar.style.width = (base - i*5) + "%";
  });
}
</script>

</body>
</html>
