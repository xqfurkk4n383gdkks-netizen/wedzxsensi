<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi AI</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<canvas id="particles"></canvas>

<div class="container">

<h1 class="logo">wedzXsensi</h1>

<div class="progress">
<div class="progress-fill" id="progressFill"></div>
</div>

<div id="step1" class="step">
<h2>Cihazını Seç</h2>

<button class="option">Android</button>
<button class="option">iPhone</button>
</div>

<div id="step2" class="step hidden">
<h2>Oyun Tarzın</h2>

<button class="option">Rushçu</button>
<button class="option">Dengeli</button>
<button class="option">Uzun Menzil</button>
</div>

<div id="step3" class="step hidden">
<h2>Kontrol Tipin</h2>

<button class="option">2 Parmak</button>
<button class="option">3 Parmak</button>
<button class="option">4 Parmak</button>
</div>

<div id="step4" class="step hidden">
<h2>Silah Tercihin</h2>

<button class="option">AR/SMG</button>
<button class="option">Tekli Silahlar</button>
<button class="option">Keskin Nişancı</button>
</div>

<div id="result" class="hidden">
<h2>Hassasiyet Sonuçları</h2>

<div class="result-item">
<span>Genel</span>
<span id="general"></span>
</div>

<div class="result-item">
<span>Kırmızı Nokta</span>
<span id="redDot"></span>
</div>

<div class="result-item">
<span>2x Dürbün</span>
<span id="scope2x"></span>
</div>

<div class="result-item">
<span>4x Dürbün</span>
<span id="scope4x"></span>
</div>

<div class="result-item">
<span>Keskin Nişancı</span>
<span id="sniper"></span>
</div>

<div class="result-item">
<span>Serbest Bakış</span>
<span id="freeLook"></span>
</div>

<div class="result-item">
<span>DPI</span>
<span id="dpi"></span>
</div>

<div class="result-item">
<span>Ateş Butonu</span>
<span id="fireBtn"></span>
</div>

</div>

</div>

<script src="script.js"></script>
</body>
</html>
