<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi W2 PRO</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

canvas{
position:fixed;
top:0;left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
width:92%;
max-width:430px;
padding:20px;
border-radius:18px;
background:rgba(10,10,10,.85);
border:1px solid rgba(255,0,80,.4);
box-shadow:0 0 25px rgba(255,0,80,.4);
backdrop-filter:blur(10px);
}

.logo{
text-align:center;
font-size:28px;
font-weight:900;
margin-bottom:10px;
color:#ff2e6a;
text-shadow:0 0 15px #ff0044;
}

.btn{
width:100%;
padding:12px;
margin:5px 0;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-weight:bold;
cursor:pointer;
border:1px solid rgba(255,255,255,.1);
}

.btn:hover{
box-shadow:0 0 15px #ff0044;
transform:scale(1.02);
}

.hidden{display:none;}

.item{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:#111;
border-radius:10px;
border:1px solid rgba(255,255,255,.1);
}

.val{
color:#ff4d6d;
font-weight:bold;
}

input,select{
width:100%;
padding:12px;
border-radius:10px;
border:none;
margin:5px 0;
background:#111;
color:#fff;
outline:none;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">wedzXsensi W2 PRO</div>

<!-- DEVICE -->
<div id="step1">
<button class="btn" onclick="setDevice('iPhone')">iPhone</button>
<button class="btn" onclick="setDevice('Android')">Android</button>
<button class="btn" onclick="setDevice('PC')">PC</button>
</div>

<!-- PHONE MODEL INPUT -->
<div id="step2" class="hidden">
<input id="phoneModel" placeholder="Telefon modelini yaz (örn: iPhone 13 / Samsung A54)">
<button class="btn" onclick="nextStep()">Devam</button>
</div>

<!-- PC BRAND -->
<div id="step3_pc" class="hidden">
<select id="pcBrand">
<option>Asus</option>
<option>MSI</option>
<option>Acer</option>
<option>HP</option>
<option>Dell</option>
<option>Lenovo</option>
</select>
<button class="btn" onclick="nextStepPC()">Devam</button>
</div>

<!-- FINGER -->
<div id="step4" class="hidden">
<button class="btn" onclick="setFinger(2)">2 Parmak</button>
<button class="btn" onclick="setFinger(3)">3 Parmak</button>
<button class="btn" onclick="setFinger(4)">4 Parmak</button>
</div>

<!-- GENERATE -->
<div id="step5" class="hidden">
<button class="btn" onclick="generate()">HASSASİYET OLUŞTUR</button>
</div>

<!-- RESULT -->
<div id="result" class="hidden">

<div class="item"><span>Model / Marka</span><span id="model" class="val"></span></div>
<div class="item"><span>Genel</span><span id="gen" class="val"></span></div>
<div class="item"><span>Kırmızı</span><span id="red" class="val"></span></div>
<div class="item"><span>2x</span><span id="x2" class="val"></span></div>
<div class="item"><span>4x</span><span id="x4" class="val"></span></div>
<div class="item"><span>Sniper</span><span id="sniper" class="val"></span></div>
<div class="item"><span>Serbest Bakış</span><span id="free" class="val"></span></div>
<div class="item"><span>DPI</span><span id="dpi" class="val"></span></div>

<button class="btn" onclick="generate()">Yeniden Oluştur</button>
<button class="btn" onclick="copy()">Kopyala</button>

</div>

</div>

<script>

let device="",phoneModel="",pcBrand="",finger=2;

function setDevice(v){
device=v;
document.getElementById("step1").classList.add("hidden");

if(v==="PC"){
document.getElementById("step3_pc").classList.remove("hidden");
}else{
document.getElementById("step2").classList.remove("hidden");
}
}

function nextStep(){
phoneModel=document.getElementById("phoneModel").value || "Unknown";
document.getElementById("step2").classList.add("hidden");
document.getElementById("step4").classList.remove("hidden");
}

function nextStepPC(){
pcBrand=document.getElementById("pcBrand").value;
document.getElementById("step3_pc").classList.add("hidden");
document.getElementById("step4").classList.remove("hidden");
}

function setFinger(v){
finger=v;
document.getElementById("step4").classList.add("hidden");
document.getElementById("step5").classList.remove("hidden");
}

function rand(min,max){
return Math.floor(Math.random()*(min,max+1)+min);
}

function generate(){

document.getElementById("result").classList.remove("hidden");

if(device==="PC"){
model.innerText=pcBrand;
gen.innerText=rand(30,70);
red.innerText=rand(35,75);
x2.innerText=rand(25,65);
x4.innerText=rand(20,60);
sniper.innerText=rand(40,80);
free.innerText=rand(40,85);
dpi.innerText=rand(400,1200);
}

else{
model.innerText=phoneModel;

if(device==="iPhone"){
gen.innerText=rand(80,100);
red.innerText=rand(80,100);
x2.innerText=rand(75,95);
x4.innerText=rand(70,90);
sniper.innerText=rand(65,85);
free.innerText=rand(80,100);
dpi.innerText=rand(70,120);
}

else{
gen.innerText=rand(170,200);
red.innerText=rand(165,200);
x2.innerText=rand(160,195);
x4.innerText=rand(150,190);
sniper.innerText=rand(140,185);
free.innerText=rand(170,200);
dpi.innerText=rand(500,800);
}
}
}

function copy(){

let text=
"wedzXsensi W2 PRO\n"+
"Model: "+model.innerText+"\n"+
"Genel: "+gen.innerText+"\n"+
"Kırmızı: "+red.innerText+"\n"+
"2x: "+x2.innerText+"\n"+
"4x: "+x4.innerText+"\n"+
"Sniper: "+sniper.innerText+"\n"+
"Serbest Bakış: "+free.innerText+"\n"+
"DPI: "+dpi.innerText;

navigator.clipboard.writeText(text);
alert("Kopyalandı!");
}

/* 🔴🔵 NEON BACKGROUND */
const c=document.getElementById("bg");
const x=c.getContext("2d");

c.width=innerWidth;
c.height=innerHeight;

let dots=[];
for(let i=0;i<300;i++){
dots.push({
x:Math.random()*c.width,
y:Math.random()*c.height,
vx:(Math.random()-.5)*1.3,
vy:(Math.random()-.5)*1.3,
r:Math.random()*2,
color:Math.random()>0.5?"#ff0055":"#00aaff"
});
}

function anim(){
x.fillStyle="#000";
x.fillRect(0,0,c.width,c.height);

for(let d of dots){
d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>c.width)d.vx*=-1;
if(d.y<0||d.y>c.height)d.vy*=-1;

x.beginPath();
x.arc(d.x,d.y,d.r,0,Math.PI*2);
x.fillStyle=d.color;
x.shadowBlur=15;
x.shadowColor=d.color;
x.fill();
}

requestAnimationFrame(anim);
}
anim();

</script>

</body>
</html>
