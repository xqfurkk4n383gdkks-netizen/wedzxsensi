<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
margin:0;
font-family:Arial;
background:#000;
color:white;
overflow:hidden;
}

/* BACKGROUND */
.bg{
position:fixed;
width:100%;
height:100%;
background:radial-gradient(circle,#200000,#000);
z-index:-1;
}

.dot{
position:absolute;
width:5px;
height:5px;
background:red;
border-radius:50%;
opacity:.6;
animation:move 6s infinite linear;
}

@keyframes move{
0%{transform:translateY(0);opacity:0}
50%{opacity:1}
100%{transform:translateY(-900px);opacity:0}
}

/* LAYOUT */
.container{
display:flex;
height:100vh;
}

/* SIDEBAR */
.side{
width:200px;
background:#0a0a0a;
padding:20px;
border-right:1px solid red;
}

.logo{
color:red;
font-size:20px;
margin-bottom:20px;
}

.menu{
padding:10px;
background:#111;
margin:10px 0;
border-radius:8px;
cursor:pointer;
border:1px solid #222;
}

.menu:hover{
border-color:red;
}

/* MAIN */
.main{
flex:1;
padding:40px;
}

/* CARD */
.card{
background:#111;
padding:20px;
border-radius:15px;
border:1px solid #222;
max-width:500px;
}

/* INPUT */
input,select{
width:100%;
padding:10px;
margin:10px 0;
background:black;
border:1px solid #333;
color:white;
border-radius:8px;
}

/* BUTTON */
button{
width:100%;
padding:12px;
background:red;
border:none;
color:white;
font-weight:bold;
border-radius:10px;
cursor:pointer;
}

button:hover{
background:#ff1b1b;
}

/* RESULT */
.bar{
margin:10px 0;
}

.bar span{
font-size:14px;
}

.line{
height:8px;
background:#222;
border-radius:10px;
overflow:hidden;
margin-top:5px;
}

.fill{
height:100%;
background:red;
width:0%;
transition:1s;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="container">

<!-- SIDEBAR -->
<div class="side">
<div class="logo">wedzxsensi</div>
<div class="menu" onclick="home()">Home</div>
<div class="menu" onclick="resultPage()">Sensitivity</div>
</div>

<!-- MAIN -->
<div class="main">

<!-- HOME -->
<div id="homePage">
<div class="card">
<h2>Device</h2>
<input id="device" placeholder="iPhone / Redmi / Samsung">

<h2>FPS</h2>
<select id="fps">
<option value="60">60 FPS</option>
<option value="90">90 FPS</option>
<option value="120">120 FPS</option>
</select>

<button onclick="generate()">GENERATE</button>
</div>
</div>

<!-- RESULT -->
<div id="resultPage" style="display:none;">
<div class="card">
<h2>AI Result</h2>
<p id="info"></p>

<div class="bar">Genel<div class="line"><div id="g" class="fill"></div></div></div>
<div class="bar">Kırmızı Nokta<div class="line"><div id="k" class="fill"></div></div></div>
<div class="bar">2x Dürbün<div class="line"><div id="d2" class="fill"></div></div></div>
<div class="bar">4x Dürbün<div class="line"><div id="d4" class="fill"></div></div></div>
<div class="bar">Serbest Bakış<div class="line"><div id="s" class="fill"></div></div></div>

</div>
</div>

</div>

<script>

/* BACKGROUND DOTS */
const bg=document.getElementById("bg");
for(let i=0;i<50;i++){
let d=document.createElement("div");
d.className="dot";
d.style.left=Math.random()*100+"%";
d.style.top=Math.random()*100+"%";
d.style.animationDuration=(3+Math.random()*5)+"s";
bg.appendChild(d);
}

/* NAV */
function home(){
document.getElementById("homePage").style.display="block";
document.getElementById("resultPage").style.display="none";
}

function resultPage(){
document.getElementById("homePage").style.display="none";
document.getElementById("resultPage").style.display="block";
}

/* RANDOM */
function r(max){
return Math.floor(Math.random()*max);
}

/* GENERATE */
function generate(){

let device=document.getElementById("device").value;
let fps=document.getElementById("fps").value;

let base = fps=="60"?120:fps=="90"?150:200;

let g=r(base);
let k=r(base);
let d2=r(base);
let d4=r(base);
let s=r(200);

/* TEXT */
document.getElementById("info").innerText=device+" • "+fps+" FPS";

/* FILL */
document.getElementById("g").style.width=g+"%";
document.getElementById("k").style.width=k+"%";
document.getElementById("d2").style.width=d2+"%";
document.getElementById("d4").style.width=d4+"%";
document.getElementById("s").style.width=s+"%";

resultPage();
}
</script>

</body>
</html>
