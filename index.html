<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxSensi</title>

<style>
body{
    margin:0;
    font-family:Arial;
    background:#000;
    color:#fff;
    text-align:center;
    overflow:hidden;
}

/* 🔴 ANIMATED BACKGROUND DOTS */
canvas{
    position:fixed;
    top:0;
    left:0;
    z-index:-1;
}

/* HEADER */
h1{
    color:red;
    margin-top:40px;
    font-size:40px;
}

p{
    opacity:0.8;
}

/* BOX */
.box{
    background:rgba(20,20,20,0.9);
    width:90%;
    max-width:420px;
    margin:20px auto;
    padding:20px;
    border-radius:15px;
    box-shadow:0 0 25px red;
}

input{
    width:90%;
    padding:12px;
    border-radius:10px;
    border:none;
    margin:10px 0;
    font-size:16px;
}

/* FPS BUTTONS */
.fps button{
    width:30%;
    padding:10px;
    margin:5px;
    border:none;
    border-radius:10px;
    background:#111;
    color:white;
    cursor:pointer;
}

.fps button.active{
    background:red;
}

/* MAIN BUTTON */
.mainbtn{
    width:95%;
    padding:15px;
    background:red;
    border:none;
    border-radius:12px;
    font-size:18px;
    color:white;
    cursor:pointer;
    margin-top:10px;
}

/* RESULT */
#sonuc{
    margin-top:15px;
    color:lime;
    font-size:18px;
    min-height:30px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>wedzxSensi</h1>
<p>Free Fire AI Hassasiyet Motoru</p>

<div class="box">

<input id="cihaz" placeholder="İphone 17 Pro Max">

<div class="fps">
    <button onclick="fpsSec(60)">60 FPS</button>
    <button onclick="fpsSec(90)">90 FPS</button>
    <button onclick="fpsSec(120)">120 FPS</button>
</div>

<button class="mainbtn" onclick="hesapla()">AI Hassasiyet Oluştur</button>

<div id="sonuc"></div>

</div>

<script>
let secilenFPS = 60;

function fpsSec(val){
    secilenFPS = val;

    document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
    event.target.classList.add("active");
}

function hesapla(){
    let cihaz = document.getElementById("cihaz").value || "Genel";

    // 🔥 PREMIUM AI LOGIC (fake but realistic scaling)
    let base = secilenFPS === 60 ? 180 : secilenFPS === 90 ? 200 : 220;

    let genel = Math.min(200, base + Math.floor(Math.random()*10));
    let red = Math.min(200, base + Math.floor(Math.random()*5));
    let scope = Math.min(200, base + Math.floor(Math.random()*8));

    document.getElementById("sonuc").innerHTML =
    "Cihaz: " + cihaz + "<br>" +
    "Genel: " + genel + "<br>" +
    "Red Dot: " + red + "<br>" +
    "Scope: " + scope;
}


/* 🔴 MOVING DOT BACKGROUND */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for(let i=0;i<80;i++){
    dots.push({
        x:Math.random()*canvas.width,
        y:Math.random()*canvas.height,
        r:Math.random()*3,
        dx:(Math.random()-0.5)*1.5,
        dy:(Math.random()-0.5)*1.5
    });
}

function draw(){
    ctx.clearRect(0,0,canvas.width,canvas.height);

    for(let d of dots){
        ctx.beginPath();
        ctx.fillStyle="red";
        ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
        ctx.fill();

        d.x += d.dx;
        d.y += d.dy;

        if(d.x<0 || d.x>canvas.width) d.dx*=-1;
        if(d.y<0 || d.y>canvas.height) d.dy*=-1;
    }

    requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
