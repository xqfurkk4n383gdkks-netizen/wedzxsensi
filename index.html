<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
    overflow-x: hidden;
}

/* Neon kırmızı background */
.bg {
    position: fixed;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 20% 20%, #2a0000, black 60%);
    z-index: -2;
}

.dot {
    position: absolute;
    width: 6px;
    height: 6px;
    background: red;
    border-radius: 50%;
    box-shadow: 0 0 10px red;
    animation: float 6s infinite alternate;
}

@keyframes float {
    from { transform: translateY(0px); opacity: 0.3; }
    to { transform: translateY(30px); opacity: 1; }
}

/* Sidebar */
.sidebar {
    width: 200px;
    height: 100vh;
    position: fixed;
    background: rgba(20,0,0,0.8);
    padding: 20px;
}

.logo {
    color: red;
    font-size: 22px;
    font-weight: bold;
    margin-bottom: 30px;
}

.btn {
    display: block;
    padding: 12px;
    margin: 10px 0;
    background: #111;
    border-radius: 10px;
    cursor: pointer;
    text-align: center;
}

.btn:hover {
    background: red;
}

/* Main */
.main {
    margin-left: 220px;
    padding: 30px;
}

/* Card */
.card {
    background: rgba(20,20,20,0.9);
    padding: 20px;
    border-radius: 15px;
    width: 400px;
    box-shadow: 0 0 20px red;
}

input, select {
    width: 100%;
    padding: 10px;
    margin-top: 10px;
    background: black;
    color: white;
    border: 1px solid red;
    border-radius: 10px;
}

button {
    width: 100%;
    padding: 12px;
    margin-top: 15px;
    background: red;
    border: none;
    color: white;
    border-radius: 10px;
    cursor: pointer;
}

/* Result */
.result {
    margin-top: 20px;
    display: none;
}

.bar {
    margin: 10px 0;
}

.line {
    height: 10px;
    background: #222;
    border-radius: 10px;
    overflow: hidden;
}

.fill {
    height: 10px;
    background: red;
}
</style>
</head>

<body>

<div class="bg" id="bg"></div>

<div class="sidebar">
    <div class="logo">wedzxsensi</div>
    <div class="btn" onclick="showHome()">Home</div>
    <div class="btn" onclick="showSens()">Sensitivity</div>
</div>

<div class="main">

<!-- HOME -->
<div id="home">
    <h1>Free Fire AI Sensitivity</h1>
    <p>En iyi ayarları cihazına göre üret</p>
</div>

<!-- SENS -->
<div id="sens" style="display:none">
    <div class="card">
        <h2>Device</h2>
        <input id="device" placeholder="iPhone / Redmi / Samsung">

        <h2>FPS</h2>
        <select id="fps">
            <option value="60">60 FPS</option>
            <option value="90">90 FPS</option>
            <option value="120">120 FPS</option>
        </select>

        <button onclick="generate()">GENERATE</button>

        <div class="result" id="result">
            <h3>AI Hassasiyet Sonucu</h3>

            <div class="bar">Genel
                <div class="line"><div class="fill" style="width:85%"></div></div>
            </div>

            <div class="bar">Red Dot
                <div class="line"><div class="fill" style="width:80%"></div></div>
            </div>

            <div class="bar">2x Scope
                <div class="line"><div class="fill" style="width:70%"></div></div>
            </div>

            <div class="bar">4x Scope
                <div class="line"><div class="fill" style="width:60%"></div></div>
            </div>

            <div class="bar">Free Look
                <div class="line"><div class="fill" style="width:90%"></div></div>
            </div>
        </div>
    </div>
</div>

</div>

<script>
function showHome(){
    document.getElementById("home").style.display="block";
    document.getElementById("sens").style.display="none";
}

function showSens(){
    document.getElementById("home").style.display="none";
    document.getElementById("sens").style.display="block";
}

function generate(){
    document.getElementById("result").style.display="block";

    let fps = document.getElementById("fps").value;

    let base = fps == 60 ? 70 : fps == 90 ? 80 : 90;

    document.querySelectorAll(".fill").forEach((el,i)=>{
        el.style.width = (base + i*2) + "%";
    });
}

/* neon floating dots */
for(let i=0;i<40;i++){
    let d = document.createElement("div");
    d.className="dot";
    d.style.left=Math.random()*100+"%";
    d.style.top=Math.random()*100+"%";
    document.getElementById("bg").appendChild(d);
}
</script>

</body>
</html>
