<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi V3</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
position:relative;
z-index:1;
text-align:center;
padding:30px;
}

h1{
text-shadow:0 0 20px red;
}

.card{
background:rgba(255,255,255,0.05);
padding:20px;
margin:15px auto;
border-radius:15px;
border:1px solid rgba(255,0,0,0.3);
max-width:500px;
backdrop-filter:blur(10px);
}

select,input,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
background:red;
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 20px red;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<h1>wedzXsensi V3</h1>

<!-- 📱 TELEFON -->
<div class="card">
<h3>📱 Telefon</h3>

<select id="brand" onchange="loadModels()">
<option>Marka</option>
<option>Apple</option>
<option>Samsung</option>
<option>Xiaomi</option>
<option>Redmi</option>
<option>POCO</option>
<option>Huawei</option>
<option>OPPO</option>
<option>Vivo</option>
</select>

<select id="model">
<option>Önce marka seç</option>
</select>
</div>

<!-- 💻 PC -->
<div class="card">
<h3>💻 PC</h3>

<select id="cpu">
<option>CPU</option>
<option>i5</option>
<option>i7</option>
<option>Ryzen 5</option>
<option>Ryzen 7</option>
</select>

<select id="gpu">
<option>GPU</option>
<option>GTX 1660</option>
<option>RTX 3060</option>
<option>RTX 4060</option>
</select>

<select id="fps">
<option>FPS</option>
<option>60</option>
<option>120</option>
<option>144</option>
<option>240</option>
</select>

<input id="dpi" placeholder="DPI">

<button onclick="startAI()">Analiz Başlat</button>

</div>

</div>

<script>

/* 🔴 NEON AĞ */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];

for(let i=0;i<80;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<dots.length;i++){
let d=dots[i];

d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>canvas.width)d.vx*=-1;
if(d.y<0||d.y>canvas.height)d.vy*=-1;

ctx.fillStyle="red";
ctx.shadowBlur=15;
ctx.shadowColor="red";

ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fill();

for(let j=i+1;j<dots.length;j++){
let d2=dots[j];
let dx=d.x-d2.x;
let dy=d.y-d2.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d2.x,d2.y);
ctx.strokeStyle="red";
ctx.globalAlpha=1-dist/120;
ctx.stroke();
ctx.globalAlpha=1;
}
}
}

requestAnimationFrame(draw);
}
draw();

/* 📱 MODELLER */
const models={
Apple:["iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15"],
Samsung:["S21","S22","S23","S24"],
Xiaomi:["Mi 11","Mi 12","Mi 13"],
Redmi:["Note 10","Note 11","Note 12"],
POCO:["X3","X5","F5"],
Huawei:["P30","P40","P50"],
OPPO:["Reno 8","Reno 9"],
Vivo:["V27","V29"]
};

function loadModels(){
let brand=document.getElementById("brand").value;
let model=document.getElementById("model");

model.innerHTML="";

if(models[brand]){
models[brand].forEach(m=>{
let opt=document.createElement("option");
opt.textContent=m;
model.appendChild(opt);
});
}
}

/* 🤖 ANALİZ */
function startAI(){

let brand=document.getElementById("brand").value;
let model=document.getElementById("model").value;
let cpu=document.getElementById("cpu").value;
let gpu=document.getElementById("gpu").value;
let fps=document.getElementById("fps").value;
let dpi=document.getElementById("dpi").value;

if(!brand||!model||!cpu||!gpu||!fps||!dpi){
alert("Eksik bilgi");
return;
}

let sens=Math.floor(Math.random()*90+30);
let headshot=Math.floor(Math.random()*40+60);

let msg="📱 "+brand+" "+model+
"\n💻 "+cpu+" + "+gpu+
"\n🎯 Sens: "+sens+
"\n🔥 Headshot: "+headshot+"%";

alert(msg);

}

</script>

</body>
</html>
