<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>wedzxsensi</title>

<style>
*{
  margin:0;
  padding:0;
  font-family: Arial, sans-serif;
  box-sizing:border-box;
}

body{
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* ARKA PLAN PARTİKÜL */
.bg{
  position:fixed;
  width:100%;
  height:100%;
  background:
    radial-gradient(circle at 20% 20%, rgba(255,0,0,0.25), transparent 40%),
    radial-gradient(circle at 80% 70%, rgba(255,0,0,0.15), transparent 40%);
}

/* LOGO */
.logo{
  text-align:center;
  margin-top:30px;
  font-size:28px;
  font-weight:bold;
}
.logo span{
  color:red;
}

/* KART */
.card{
  width:90%;
  max-width:420px;
  margin:40px auto;
  background:rgba(20,20,20,0.9);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,0,0,0.3);
  box-shadow:0 0 20px rgba(255,0,0,0.2);
}

/* INPUT */
input{
  width:100%;
  padding:12px;
  border-radius:10px;
  border:none;
  outline:none;
  margin-top:10px;
  background:#111;
  color:white;
}

/* FPS BUTON */
.fps{
  display:flex;
  justify-content:space-between;
  margin-top:15px;
}
.fps button{
  flex:1;
  margin:5px;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#111;
  color:white;
  cursor:pointer;
}
.fps button.active{
  background:red;
}

/* BUTON */
.btn{
  width:100%;
  padding:12px;
  margin-top:20px;
  background:red;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

/* SONUÇ */
.result{
  display:none;
  width:90%;
  max-width:450px;
  margin:20px auto;
  background:rgba(20,20,20,0.95);
  padding:20px;
  border-radius:15px;
  border:1px solid rgba(255,0,0,0.4);
}

.bar{
  margin:12px 0;
}
.bar label{
  font-size:14px;
  display:flex;
  justify-content:space-between;
}

.line{
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}
.fill{
  height:100%;
  background:red;
  width:50%;
  border-radius:10px;
}

.ai{
  margin-top:15px;
  font-size:13px;
  opacity:0.8;
  line-height:1.4;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="logo">
wedzx<span>sensi</span>
</div>

<!-- ANA SAYFA -->
<div class="card" id="home">
  <h3>CIHAZ MODELI</h3>
  <input id="device" placeholder="Örn. iPhone 13 / Redmi Note 13">

  <h3 style="margin-top:15px;">FPS</h3>
  <div class="fps">
    <button onclick="setFPS(this,60)">60 FPS</button>
    <button onclick="setFPS(this,90)">90 FPS</button>
    <button onclick="setFPS(this,120)">120 FPS</button>
  </div>

  <button class="btn" onclick="generate()">AI HASSASİYET OLUŞTUR</button>
</div>

<!-- SONUÇ -->
<div class="result" id="result">

  <h3>YAPAY ZEKA SONUCU</h3>
  <p id="info" style="margin:10px 0;color:#aaa;"></p>

  <div class="bar"><label>Genel <span id="g1"></span></label><div class="line"><div class="fill" id="b1"></div></div></div>
  <div class="bar"><label>Kırmızı Nokta <span id="g2"></span></label><div class="line"><div class="fill" id="b2"></div></div></div>
  <div class="bar"><label>2x Dürbün <span id="g3"></span></label><div class="line"><div class="fill" id="b3"></div></div></div>
  <div class="bar"><label>4x Dürbün <span id="g4"></span></label><div class="line"><div class="fill" id="b4"></div></div></div>
  <div class="bar"><label>Tüfek Dürbünü <span id="g5"></span></label><div class="line"><div class="fill" id="b5"></div></div></div>
  <div class="bar"><label>Serbest Bakış <span id="g6"></span></label><div class="line"><div class="fill" id="b6"></div></div></div>

  <div class="ai">
    AI ipucu: Düşman görünce önce genel hassasiyetle hızlı dön, sonra dürbün ile micro ayar yap.
  </div>
</div>

<script>
let fps = 60;

function setFPS(btn,val){
  fps = val;
  document.querySelectorAll(".fps button").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function generate(){
  let device = document.getElementById("device").value || "Bilinmiyor";

  document.getElementById("home").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("info").innerText = device + " • " + fps + " FPS";

  let base = fps === 60 ? 140 : fps === 90 ? 160 : 185;

  let values = [
    base,
    base-5,
    base-20,
    base-40,
    base-60,
    200
  ];

  for(let i=1;i<=6;i++){
    document.getElementById("g"+i).innerText = values[i-1];
    document.getElementById("b"+i).style.width = (values[i-1]/2) + "%";
  }
}
</script>

</body>
</html>
