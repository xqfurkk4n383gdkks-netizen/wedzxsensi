<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body {
    margin:0;
    font-family: Arial, sans-serif;
    background:#000;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND PARTICLES */
.particles {
    position:fixed;
    width:100%;
    height:100%;
    background:black;
    overflow:hidden;
    z-index:-1;
}

.particles span {
    position:absolute;
    width:6px;
    height:6px;
    background:red;
    border-radius:50%;
    animation: float 10s linear infinite;
    opacity:0.6;
}

@keyframes float {
    0% {transform: translateY(100vh);}
    100% {transform: translateY(-10vh);}
}

/* CENTER CARD */
.card {
    width:360px;
    margin:80px auto;
    padding:20px;
    background:rgba(20,0,0,0.7);
    border:1px solid red;
    border-radius:15px;
    box-shadow:0 0 20px red;
}

/* BUTTONS */
button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    font-weight:bold;
}

.red {
    background:red;
    color:white;
}

.dark {
    background:#111;
    color:white;
    border:1px solid red;
}

/* SLIDERS */
.bar {
    margin:15px 0;
}

.line {
    height:6px;
    background:#333;
    border-radius:10px;
    position:relative;
}

.fill {
    height:6px;
    background:red;
    border-radius:10px;
    width:70%;
}

.label {
    display:flex;
    justify-content:space-between;
    font-size:14px;
}
.hidden {display:none;}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<!-- ANA SAYFA -->
<div id="home" class="card">
    <h2>wedzxsensi</h2>
    <p>Free Fire AI Hassasiyet Motoru</p>

    <input id="device" placeholder="iPhone 13, Redmi Note 13"
    style="width:100%;padding:10px;border-radius:10px;border:none;">

    <button class="red" onclick="create()">AI Hassasiyet Oluştur</button>
</div>

<!-- SONUÇ SAYFASI -->
<div id="result" class="card hidden">
    <h3>Yapay Zeka Sonucu</h3>

    <div class="bar">
        <div class="label"><span>Genel</span><span>185</span></div>
        <div class="line"><div class="fill" style="width:85%"></div></div>
    </div>

    <div class="bar">
        <div class="label"><span>Kırmızı Nokta</span><span>180</span></div>
        <div class="line"><div class="fill" style="width:80%"></div></div>
    </div>

    <div class="bar">
        <div class="label"><span>2X</span><span>165</span></div>
        <div class="line"><div class="fill" style="width:70%"></div></div>
    </div>

    <div class="bar">
        <div class="label"><span>4X</span><span>145</span></div>
        <div class="line"><div class="fill" style="width:60%"></div></div>
    </div>

    <div class="bar">
        <div class="label"><span>Tüfek</span><span>125</span></div>
        <div class="line"><div class="fill" style="width:50%"></div></div>
    </div>

    <div class="bar">
        <div class="label"><span>Serbest Bakış</span><span>200</span></div>
        <div class="line"><div class="fill" style="width:95%"></div></div>
    </div>

    <button class="red" onclick="back()">Geri Dön</button>
</div>

<script>
// particle generator
const p = document.getElementById("particles");
for(let i=0;i<40;i++){
    let s=document.createElement("span");
    s.style.left=Math.random()*100+"%";
    s.style.animationDuration=(5+Math.random()*10)+"s";
    s.style.opacity=Math.random();
    p.appendChild(s);
}

function create(){
    document.getElementById("home").classList.add("hidden");
    document.getElementById("result").classList.remove("hidden");
}

function back(){
    document.getElementById("result").classList.add("hidden");
    document.getElementById("home").classList.remove("hidden");
}
</script>

</body>
</html>
