<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Sensitivity</title>
</head>
<body>

<button onclick="selectDevice('iPhone')">iPhone</button>
<button onclick="selectDevice('Android')">Android</button>
<button onclick="generate()">Generate</button>

<h3 id="general"></h3>
<h3 id="red"></h3>
<h3 id="x2"></h3>
<h3 id="x4"></h3>
<h3 id="sniper"></h3>
<h3 id="free"></h3>
<h3 id="dpi"></h3>
<h3 id="fire"></h3>

<script>

let device = "";
let style = "Rush";
let finger = 4;

function selectDevice(v){
  device = v;
}

function rand(min,max){
  return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){

let general, red, x2, x4, sniper, free, dpi, fire;

if(device === "iPhone"){

  general = 100 + rand(0,6);
  red     = 95  + rand(0,6);
  x2      = 85  + rand(0,6);
  x4      = 75  + rand(0,6);
  sniper  = 60  + rand(0,6);
  free    = 105 + rand(0,6);
  dpi     = 500 + rand(0,21);
  fire    = 45  + rand(0,4);

}else{

  let base = 155;

  if(style==="Rush") base+=10;
  if(style==="Range") base-=5;
  if(finger===4) base+=5;

  general = Math.min(200, base+rand(0,10));
  red     = Math.min(200, base+rand(-5,10));
  x2      = Math.min(200, base-10+rand(0,10));
  x4      = Math.min(200, base-20+rand(0,10));
  sniper  = Math.min(200, base-30+rand(0,10));
  free    = Math.min(200, base+rand(-10,10));
  dpi     = rand(500,800);
  fire    = rand(45,65);

}

document.getElementById("general").innerText = general;
document.getElementById("red").innerText = red;
document.getElementById("x2").innerText = x2;
document.getElementById("x4").innerText = x4;
document.getElementById("sniper").innerText = sniper;
document.getElementById("free").innerText = free;
document.getElementById("dpi").innerText = dpi;
document.getElementById("fire").innerText = fire + "%";

}

</script>

</body>
</html>
