<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi W2</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
background:#000;
color:#fff;
display:flex;
justify-content:center;
align-items:center;
min-height:100vh;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.container{
width:92%;
max-width:420px;
padding:20px;
border-radius:20px;
background:rgba(0,0,0,.85);
border:1px solid rgba(255,0,0,.3);
box-shadow:0 0 25px red;
}

.logo{
text-align:center;
font-size:30px;
font-weight:900;
margin-bottom:15px;
text-shadow:0 0 15px red;
}

.btn{
width:100%;
padding:12px;
margin:6px 0;
border:none;
border-radius:12px;
background:#111;
color:#fff;
font-weight:bold;
cursor:pointer;
}

.btn:hover{
box-shadow:0 0 10px red;
}

.hidden{display:none;}

.resultItem{
display:flex;
justify-content:space-between;
padding:10px;
margin:6px 0;
background:#111;
border-radius:10px;
border:1px solid rgba(255,0,0,.2);
}

.value{
color:#ff4444;
font-weight:bold;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="container">

<div class="logo">wedzXsensi W2</div>

<div id="step1">
<button class="btn" onclick="setDevice('iPhone')">iPhone</button>
<button class="btn" onclick="setDevice('Android')">Android</button>
</div>

<div id="stepPhone" class="hidden">
<button class="btn" onclick="setPhone('iPhone 11')">iPhone 11</button>
<button class="btn" onclick="setPhone('iPhone 12')">iPhone 12</button>
<button class="btn" onclick="setPhone('iPhone 13')">iPhone 13</button>
<button class="btn" onclick="setPhone('iPhone 14')">iPhone 14</button>
<button class="btn" onclick="setPhone('iPhone 15')">iPhone 15</button>
</div>

<div id="step2" class="hidden">
<button class="btn" onclick="setStyle('Rush')">Rush</button>
<button class="btn" onclick="setStyle('Rage')">Rage</button>
<button class="btn" onclick="setStyle('Long Range')">Long Range</button>
</div>

<div id="step3" class="hidden">
<button class="btn" onclick="setFinger(2)">2 Parmak</button>
<button class="btn" onclick="setFinger(3)">3 Parmak</button>
<button class="btn" onclick="setFinger(4)">4 Parmak</button>
</div>

<div id="step4" class="hidden">
<button class="btn" onclick="generate()">HASSASİYET OLUŞTUR</button>
</div>

<div id="result" class="hidden">

<div class="resultItem"><span>Telefon</span><span id="phone"></span></div>
<div class="resultItem"><span>Headshot</span><span id="headshot"></span></div>
<div class="resultItem"><span>Genel</span><span id="general"></span></div>
<div class="resultItem"><span>Kırmızı Nokta</span><span id="red"></span></div>
<div class="resultItem"><span>2x</span><span id="x2"></span></div>
<div class="resultItem"><span>4x</span><span id="x4"></span></div>
<div class="resultItem"><span>Sniper</span><span id="sniper"></span></div>
<div class="resultItem"><span>DPI</span><span id="dpi"></span></div>

<button class="btn" onclick="copyResult()">Kopyala</button>
<button class="btn" onclick="location.reload()">Yeniden</button>

</div>

</div>

<script>

let device="",phone="",style="",finger=2;

function next(a,b){
document.getElementById(a).classList.add("hidden");
document.getElementById(b).classList.remove("hidden");
}

function setDevice(v){
device=v;
if(v==="iPhone") next("step1","stepPhone");
else next("step1","step2");
}

function setPhone(v){
phone=v;
next("stepPhone","step2");
}

function setStyle(v){
style=v;
next("step2","step3");
}

function setFinger(v){
finger=v;
next("step3","step4");
}

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function generate(){

next("step4","result");

phone.innerText=phone;

document.getElementById("phone").innerText=phone;

if(device==="iPhone"){

document.getElementById("headshot").innerText=rand(85,99)+"%";
document.getElementById("general").innerText=rand(80,100);
document.getElementById("red").innerText=rand(75,100);
document.getElementById("x2").innerText=rand(70,95);
document.getElementById("x4").innerText=rand(65,90);
document.getElementById("sniper").innerText=rand(60,85);
document.getElementById("dpi").innerText=rand(70,120);

}else{

document.getElementById("headshot").innerText=rand(80,98)+"%";
document.getElementById("general").innerText=rand(170,200);
document.getElementById("red").innerText=rand(160,200);
document.getElementById("x2").innerText=rand(150,195);
document.getElementById("x4").innerText=rand(140,190);
document.getElementById("sniper").innerText=rand(130,185);
document.getElementById("dpi").innerText=rand(500,800);

}

}

function copyResult(){

let text=
"wedzXsensi W2\n"+
"Phone: "+document.getElementById("phone").innerText+"\n"+
"Headshot: "+document.getElementById("headshot").innerText+"\n"+
"General: "+document.getElementById("general").innerText;

navigator.clipboard.writeText(text);
alert("Kopyalandı");

}

/* NEON */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

function resize(){
canvas.width=innerWidth;
canvas.height=innerHeight;
}
resize();
window.addEventListener("resize",resize);

let dots=[];
for(let i=0;i<250;i++){
dots.push({
x:Math.random()*innerWidth,
y:Math.random()*innerHeight,
vx:(Math.random()-.5)*1.5,
vy:(Math.random()-.5)*1.5,
r:Math.random()*2
});
}

function animate(){
ctx.fillStyle="#000";
ctx.fillRect(0,0,canvas.width,canvas.height);

for(let d of dots){
d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>canvas.width)d.vx*=-1;
if(d.y<0||d.y>canvas.height)d.vy*=-1;

ctx.beginPath();
ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
ctx.fillStyle="red";
ctx.fill();
}

requestAnimationFrame(animate);
}
animate();

</script>

</body>
</html>
