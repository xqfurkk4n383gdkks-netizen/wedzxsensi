<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzXsensi V3</title>

<style>
body{
margin:0;
background:#000;
color:#fff;
font-family:Arial;
overflow:hidden;
}

canvas{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
z-index:-1;
}

.wrap{
position:relative;
z-index:1;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
height:100vh;
}

.panel{
width:90%;
max-width:600px;
background:rgba(255,255,255,0.06);
border:1px solid rgba(255,0,0,0.3);
border-radius:15px;
padding:20px;
backdrop-filter:blur(10px);
box-shadow:0 0 25px rgba(255,0,0,0.2);
}

h1{
text-align:center;
text-shadow:0 0 20px red;
}

select,input,button{
width:100%;
padding:10px;
margin-top:10px;
border-radius:10px;
border:none;
outline:none;
}

button{
background:linear-gradient(90deg,red,darkred);
color:white;
font-weight:bold;
cursor:pointer;
}

button:hover{
box-shadow:0 0 20px red;
transform:scale(1.03);
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<div class="wrap">

<h1>wedzXsensi V3</h1>

<div class="panel">

<h3>📱 Cihaz</h3>

<select id="brand" onchange="loadModels()">
<option>Marka Seç</option>
<option>Apple</option>
<option>Samsung</option>
<option>Xiaomi</option>
<option>Redmi</option>
<option>POCO</option>
<option>Huawei</option>
<option>OPPO</option>
<option>Vivo</option>
</select>

<select id="model">
<option>Model</option>
</select>

<h3>💻 PC</h3>

<select id="cpu">
<option>CPU</option>
<option>i5</option>
<option>i7</option>
<option>Ryzen 5</option>
<option>Ryzen 7</option>
</select>

<select id="gpu">
<option>GPU</option>
<option>GTX 1660</option>
<option>RTX 3060</option>
<option>RTX 4060</option>
</select>

<select id="fps">
<option>FPS</option>
<option>60</option>
<option>120</option>
<option>144</option>
<option>240</option>
</select>

<input id="dpi" placeholder="DPI">

<button onclick="startAI()">Analiz Başlat</button>

</div>

</div>

<script>

/* 🔴 NEON AĞ */
const canvas=document.getElementById("bg");
const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;
canvas.height=window.innerHeight;

let dots=[];

for(let i=0;i<90;i++){
dots.push({
x:Math.random()*canvas.width,
y:Math.random()*canvas.height,
vx:(Math.random()-0.5)*1,
vy:(Math.random()-0.5)*1
});
}

function draw(){
ctx.clearRect(0,0,canvas.width,canvas.height);

for(let i=0;i<dots.length;i++){
let d=dots[i];

d.x+=d.vx;
d.y+=d.vy;

if(d.x<0||d.x>canvas.width)d.vx*=-1;
if(d.y<0||d.y>canvas.height)d.vy*=-1;

ctx.fillStyle="red";
ctx.shadowBlur=15;
ctx.shadowColor="red";

ctx.beginPath();
ctx.arc(d.x,d.y,2,0,Math.PI*2);
ctx.fill();

for(let j=i+1;j<dots.length;j++){
let d2=dots[j];
let dx=d.x-d2.x;
let dy=d.y-d2.y;
let dist=Math.sqrt(dx*dx+dy*dy);

if(dist<120){
ctx.beginPath();
ctx.moveTo(d.x,d.y);
ctx.lineTo(d2.x,d2.y);
ctx.strokeStyle="red";
ctx.globalAlpha=1-dist/120;
ctx.stroke();
ctx.globalAlpha=1;
}
}
}

requestAnimationFrame(draw);
}
draw();

/* 📱 MODELLER */
const models={
Apple:["iPhone 11","iPhone 12","iPhone 13","iPhone 14","iPhone 15"],
Samsung:["S21","S22","S23","S24","A54"],
Xiaomi:["Mi 11","Mi 12","Mi 13"],
Redmi:["Note 10","Note 11","Note 12"],
POCO:["X3","X5","F5"],
Huawei:["P30","P40","P50"],
OPPO:["Reno 8","Reno 9"],
Vivo:["V27","V29"]
};

function loadModels(){
let b=document.getElementById("brand").value;
let m=document.getElementById("model");

m.innerHTML="";

if(models[b]){
models[b].forEach(x=>{
let o=document.createElement("option");
o.textContent=x;
m.appendChild(o);
});
}
}

/* 🤖 ANALİZ */
function startAI(){

let brand=document.getElementById("brand").value;
let model=document.getElementById("model").value;
let cpu=document.getElementById("cpu").value;
let gpu=document.getElementById("gpu").value;
let fps=document.getElementById("fps").value;
let dpi=document.getElementById("dpi").value;

if(!brand||!model||!cpu||!gpu||!fps||!dpi){
alert("Eksik bilgi");
return;
}

let sens=Math.floor(Math.random()*90+30);
let headshot=Math.floor(Math.random()*40+60);

alert(
"📱 "+brand+" "+model+
"\n💻 "+cpu+" + "+gpu+
"\n🎯 Sens: "+sens+
"\n🔥 Headshot: "+headshot+"%"
);

}

</script>

</body>
</html>
