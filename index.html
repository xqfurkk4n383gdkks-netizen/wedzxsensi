<script>

const canvas=document.getElementById("bg");

const ctx=canvas.getContext("2d");

canvas.width=window.innerWidth;

canvas.height=window.innerHeight;

let particles=[];

for(let i=0;i<120;i++){

particles.push({

x:Math.random()*canvas.width,

y:Math.random()*canvas.height,

vx:(Math.random()-.5)*1,

vy:(Math.random()-.5)*1,

r:2+Math.random()*2,

c:[
"#ff0000",
"#00ffff",
"#00ff66"
][Math.floor(Math.random()*3)]

});

}

function draw(){

ctx.clearRect(0,0,canvas.width,canvas.height);

particles.forEach(p=>{

ctx.beginPath();

ctx.fillStyle=p.c;

ctx.arc(p.x,p.y,p.r,0,Math.PI*2);

ctx.fill();

p.x+=p.vx;

p.y+=p.vy;

if(p.x<0||p.x>canvas.width)p.vx*=-1;

if(p.y<0||p.y>canvas.height)p.vy*=-1;

});

requestAnimationFrame(draw);

}

draw();

function rand(min,max){
return Math.floor(Math.random()*(max-min+1))+min;
}

function optimize(min,max,fps){

let value=rand(min,max);

if(fps>=120)value+=rand(2,8);
if(fps>=165)value+=rand(2,5);
if(fps>=240)value+=rand(2,4);

if(value>max)value=max;

return value;

}

function aiValue(platform,fps,type){

const range=aiRange(platform);

let value=random(range.min,range.max);

const bonus=Math.floor(fps/30);

value+=random(0,bonus);

switch(type){

if(value<range.min)value=range.min;

return value;

}

function limit(v,min,max){

if(v<min)return min;

if(v>max)return max;

return v;

}

function applyOptimizer(values){

const platform=document.getElementById("platform").value;

const brand=document.getElementById("brand").value;

const style=document.getElementById("style").value;

const range=aiRange(platform);

const b=getBrandBonus(brand);

const s=getStyleBonus(style);

values.general=
limit(values.general+b.general+s.general,
range.min,
range.max);

values.red=
limit(values.red+b.red+s.red,
range.min,
range.max);

values.two=
limit(values.two+b.two+s.two,
range.min,
range.max);

values.four=
limit(values.four+b.four+s.four,
range.min,
range.max);

values.sniper=
limit(values.sniper+b.sniper+s.sniper,
range.min,
range.max);

values.free=
limit(values.free+b.free+s.free,
range.min,
range.max);

return values;

}

function getModelBonus(model){

model=model.toLowerCase();

let bonus=0;

if(model.includes("pro")) bonus+=3;

if(model.includes("plus")) bonus+=2;

if(model.includes("ultra")) bonus+=5;

if(model.includes("max")) bonus+=4;

if(model.includes("gaming")) bonus+=6;

if(model.includes("gt")) bonus+=3;

if(model.includes("neo")) bonus+=2;

if(model.includes("turbo")) bonus+=4;

return bonus;

}

general:aiValue(platform,fps,"general"),

red:aiValue(platform,fps,"red"),

two:aiValue(platform,fps,"scope2"),

four:aiValue(platform,fps,"scope4"),

free:aiValue(platform,fps,"free")

};

values=applyOptimizer(values);

const modelBonus=getModelBonus(model);

const range=aiRange(platform);

values.general=limit(values.general+modelBonus,range.min,range.max);

values.red=limit(values.red+modelBonus,range.min,range.max);

values.two=limit(values.two+Math.floor(modelBonus/2),range.min,range.max);

values.four=limit(values.four+Math.floor(modelBonus/3),range.min,range.max);

values.sniper=limit(values.sniper,range.min,range.max);

document.getElementById("reddot").innerHTML=values.red;

document.getElementById("x2").innerHTML=values.two;

document.getElementById("x4").innerHTML=values.four;

document.getElementById("sniper").innerHTML=values.sniper;

}

function dynamicRandom(min,max,seed){

const x=Math.sin(seed++)*10000;

const r=x-Math.floor(x);

return Math.floor(r*(max-min+1))+min;

}
