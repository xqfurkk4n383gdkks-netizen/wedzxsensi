<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi</title>

<style>
body{
  margin:0;
  font-family:Arial;
  background:black;
  color:white;
}

.bg{
  position:fixed;
  width:100%;
  height:100%;
  background: radial-gradient(circle, rgba(255,0,0,0.2), transparent 60%);
  z-index:-1;
}

.logo{
  text-align:center;
  font-size:26px;
  margin-top:25px;
  font-weight:bold;
}
.logo span{color:red;}

.card{
  width:90%;
  max-width:420px;
  margin:40px auto;
  background:#111;
  padding:20px;
  border-radius:12px;
  border:1px solid rgba(255,0,0,0.3);
}

input{
  width:100%;
  padding:10px;
  border-radius:8px;
  border:none;
  margin-top:10px;
  background:#000;
  color:white;
}

.fps{
  display:flex;
  gap:8px;
  margin-top:10px;
}

.fps button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:8px;
  background:#222;
  color:white;
  cursor:pointer;
}

.fps button.active{
  background:red;
}

.btn{
  width:100%;
  margin-top:15px;
  padding:12px;
  background:red;
  border:none;
  color:white;
  border-radius:10px;
  cursor:pointer;
  font-weight:bold;
}

.result{
  display:none;
  width:90%;
  max-width:420px;
  margin:20px auto;
  background:#111;
  padding:20px;
  border-radius:12px;
}

.bar{
  margin:10px 0;
}

.bar label{
  display:flex;
  justify-content:space-between;
  font-size:14px;
}

.line{
  height:6px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
  margin-top:5px;
}

.fill{
  height:100%;
  width:0%;
  background:red;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="logo">wedzx<span>sensi</span></div>

<div class="card" id="home">

  <input id="device" placeholder="Cihaz modeli">

  <div class="fps">
    <button onclick="setFPS(this,60)">60 FPS</button>
    <button onclick="setFPS(this,90)">90 FPS</button>
    <button onclick="setFPS(this,120)">120 FPS</button>
  </div>

  <button class="btn" onclick="generate()">AI HASSASİYET OLUŞTUR</button>
</div>

<div class="result" id="result">

  <h3>YAPAY ZEKA SONUCU</h3>
  <p id="info"></p>

  <div class="bar"><label>Genel <span id="v1"></span></label><div class="line"><div class="fill" id="b1"></div></div></div>
  <div class="bar"><label>Kırmızı Nokta <span id="v2"></span></label><div class="line"><div class="fill" id="b2"></div></div></div>
  <div class="bar"><label>2x <span id="v3"></span></label><div class="line"><div class="fill" id="b3"></div></div></div>
  <div class="bar"><label>4x <span id="v4"></span></label><div class="line"><div class="fill" id="b4"></div></div></div>
  <div class="bar"><label>Tüfek <span id="v5"></span></label><div class="line"><div class="fill" id="b5"></div></div></div>
  <div class="bar"><label>Serbest <span id="v6"></span></label><div class="line"><div class="fill" id="b6"></div></div></div>

</div>

<script>

let fps = 60;

function setFPS(btn,val){
  fps = val;

  document.querySelectorAll(".fps button")
  .forEach(b=>b.classList.remove("active"));

  btn.classList.add("active");
}

function generate(){

  let device = document.getElementById("device").value || "Bilinmiyor";

  document.getElementById("home").style.display="none";
  document.getElementById("result").style.display="block";

  document.getElementById("info").innerText =
    device + " • " + fps + " FPS";

  let base =
    fps === 60 ? 140 :
    fps === 90 ? 165 :
    185;

  let values = [
    base,
    base-10,
    base-25,
    base-45,
    base-60,
    200
  ];

  for(let i=1;i<=6;i++){
    document.getElementById("v"+i).innerText = values[i-1];

    // bar % düzeltme
    document.getElementById("b"+i).style.width =
      (values[i-1] / 2) + "%";
  }
}

</script>

</body>
</html>
