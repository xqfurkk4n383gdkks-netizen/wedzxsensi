<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxSensi</title>

<style>
body {
  margin: 0;
  background: black;
  color: white;
  font-family: Arial;
  text-align: center;
  overflow: hidden;
}

/* ARKA PLAN KIRMIZI NOKTALAR */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  z-index: -1;
}

h1 {
  color: red;
  margin-top: 20px;
}

.box {
  background: rgba(20,20,20,0.9);
  padding: 20px;
  max-width: 400px;
  margin: auto;
  border-radius: 15px;
  margin-top: 30px;
}

input {
  width: 90%;
  padding: 10px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
}

button {
  width: 95%;
  padding: 12px;
  background: red;
  border: none;
  color: white;
  font-weight: bold;
  border-radius: 10px;
  cursor: pointer;
}

.result {
  margin-top: 15px;
  color: lime;
  font-size: 18px;
}
</style>
</head>

<body>

<canvas id="bg"></canvas>

<h1>wedzxSensi</h1>
<p>Free Fire AI Hassasiyet Motoru</p>

<div class="box">

<input type="text" id="device" placeholder="Cihaz modeli (örn: iPhone 13)">
<br><br>

<button onclick="setFPS(60)">60 FPS</button>
<button onclick="setFPS(90)">90 FPS</button>
<button onclick="setFPS(120)">120 FPS</button>

<br><br>

<button onclick="generate()">AI Hassasiyet Oluştur</button>

<div class="result" id="result"></div>

</div>

<script>
let fps = 60;

function setFPS(x){
  fps = x;
}

function generate(){
  let base = fps === 60 ? 180 : fps === 90 ? 200 : 220;

  let genel = Math.floor(Math.random()*20) + base;
  let red = Math.floor(Math.random()*20) + base - 10;
  let scope = Math.floor(Math.random()*20) + base - 5;

  if(genel > 200) genel = 200;
  if(red > 200) red = 200;
  if(scope > 200) scope = 200;

  document.getElementById("result").innerHTML =
  "Genel: " + genel + "<br>Red Dot: " + red + "<br>Scope: " + scope;
}

/* 🔴 KIRMIZI NOKTA ANİMASYONU */
const canvas = document.getElementById("bg");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let dots = [];

for(let i=0;i<80;i++){
  dots.push({
    x: Math.random()*canvas.width,
    y: Math.random()*canvas.height,
    r: Math.random()*3,
    dx: (Math.random()-0.5)*1,
    dy: (Math.random()-0.5)*1
  });
}

function draw(){
  ctx.clearRect(0,0,canvas.width,canvas.height);

  for(let d of dots){
    ctx.beginPath();
    ctx.fillStyle = "red";
    ctx.arc(d.x,d.y,d.r,0,Math.PI*2);
    ctx.fill();

    d.x += d.dx;
    d.y += d.dy;

    if(d.x < 0 || d.x > canvas.width) d.dx *= -1;
    if(d.y < 0 || d.y > canvas.height) d.dy *= -1;
  }

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
