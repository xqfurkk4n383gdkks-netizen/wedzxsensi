<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>wedzxsensi AI</title>

<style>
body {
  margin:0;
  font-family: Arial;
  background:#000;
  color:white;
  overflow-x:hidden;
}

/* neon background particles */
.background {
  position:fixed;
  width:100%;
  height:100%;
  background:black;
  overflow:hidden;
  z-index:-1;
}

.dot {
  position:absolute;
  width:6px;
  height:6px;
  background:red;
  border-radius:50%;
  opacity:0.6;
  animation: float 6s infinite;
}

@keyframes float {
  0% {transform:translateY(0); opacity:0;}
  50% {opacity:1;}
  100% {transform:translateY(-800px); opacity:0;}
}

/* layout */
.container{
  display:flex;
}

/* sidebar */
.sidebar{
  width:200px;
  height:100vh;
  background:#0a0a0a;
  padding:20px;
  border-right:1px solid red;
}

.sidebar h2{
  color:red;
}

.btnMenu{
  display:block;
  margin:10px 0;
  padding:10px;
  background:#111;
  border:1px solid #222;
  color:white;
  cursor:pointer;
  border-radius:8px;
}

.btnMenu:hover{
  border-color:red;
}

/* main */
.main{
  flex:1;
  padding:40px;
}

/* card */
.card{
  background:#111;
  padding:20px;
  border-radius:15px;
  border:1px solid #222;
  max-width:500px;
}

input, select{
  width:100%;
  padding:10px;
  margin:10px 0;
  background:black;
  border:1px solid #333;
  color:white;
  border-radius:8px;
}

button{
  width:100%;
  padding:12px;
  background:red;
  border:none;
  color:white;
  font-weight:bold;
  border-radius:10px;
  cursor:pointer;
}

button:hover{
  background:#ff1a1a;
}

/* result bars */
.bar{
  margin:10px 0;
}

.bar span{
  display:block;
  font-size:14px;
  margin-bottom:5px;
}

.progress{
  height:10px;
  background:#222;
  border-radius:10px;
  overflow:hidden;
}

.progress div{
  height:10px;
  background:red;
}
</style>
</head>

<body>

<div class="background" id="bg"></div>

<div class="container">

  <div class="sidebar">
    <h2>wedzxsensi</h2>
    <button class="btnMenu" onclick="showHome()">Home</button>
    <button class="btnMenu" onclick="showResult()">Sensitivity</button>
  </div>

  <div class="main">

    <!-- HOME -->
    <div id="home">
      <div class="card">
        <h2>Device</h2>
        <input id="device" placeholder="iPhone / Redmi / Samsung">

        <h2>FPS</h2>
        <select id="fps">
          <option value="60">60 FPS</option>
          <option value="90">90 FPS</option>
          <option value="120">120 FPS</option>
        </select>

        <button onclick="generate()">GENERATE</button>
      </div>
    </div>

    <!-- RESULT -->
    <div id="result" style="display:none;">
      <div class="card">
        <h2>AI Hassasiyet Sonucu</h2>
        <p id="info"></p>

        <div class="bar"><span>Genel</span><div class="progress"><div id="g"></div></div></div>
        <div class="bar"><span>Kırmızı Nokta</span><div class="progress"><div id="k"></div></div></div>
        <div class="bar"><span>2x Dürbün</span><div class="progress"><div id="d2"></div></div></div>
        <div class="bar"><span>4x Dürbün</span><div class="progress"><div id="d4"></div></div></div>
        <div class="bar"><span>Serbest Bakış</span><div class="progress"><div id="s"></div></div></div>
      </div>
    </div>

  </div>
</div>

<script>
// particles
const bg = document.getElementById("bg");
for(let i=0;i<40;i++){
  let d = document.createElement("div");
  d.className="dot";
  d.style.left=Math.random()*100+"%";
  d.style.top=Math.random()*100+"%";
  d.style.animationDuration=(3+Math.random()*5)+"s";
  bg.appendChild(d);
}

function showHome(){
  document.getElementById("home").style.display="block";
  document.getElementById("result").style.display="none";
}

function showResult(){
  document.getElementById("home").style.display="none";
  document.getElementById("result").style.display="block";
}

function rand(max){
  return Math.floor(Math.random()*max);
}

function generate(){
  let device = document.getElementById("device").value;
  let fps = document.getElementById("fps").value;

  let base = fps == 60 ? 120 : fps == 90 ? 150 : 180;

  let g = rand(base);
  let k = rand(base);
  let d2 = rand(base);
  let d4 = rand(base);
  let s = rand(200);

  document.getElementById("info").innerText =
    device + " • " + fps + " FPS";

  document.getElementById("g").style.width=g+"%";
  document.getElementById("k").style.width=k+"%";
  document.getElementById("d2").style.width=d2+"%";
  document.getElementById("d4").style.width=d4+"%";
  document.getElementById("s").style.width=s+"%";

  showResult();
}
</script>

</body>
</html>
